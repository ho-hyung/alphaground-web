name: Update Property Data

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/alpha_report.json'
      - 'scripts/generate-data.mjs'
  workflow_dispatch:  # 수동 트리거 가능

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate public/data/properties.json
        run: |
          cd alphaground-dashboard
          node scripts/generate-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alphaground-dashboard/public/data/properties.json
          git diff --staged --quiet || git commit -m "chore: update property data [skip ci]

Co-Authored-By: Paperclip <noreply@paperclip.ing>"
          git push
